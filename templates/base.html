<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ToolReplaceWeb</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f7f8fa; }
    .container-narrow { max-width: 1400px; }
    .table-wrap { overflow-x: auto; }
    .table td, .table th { white-space: nowrap; font-size: 0.85rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom mb-3">
    <div class="container container-narrow">
      <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">ToolReplaceWeb</a>
      <a class="btn btn-primary btn-sm" href="{{ url_for('create_row') }}">신규 등록</a>
    </div>
  </nav>

  <main class="container container-narrow pb-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} py-2" role="alert">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
